name: Update README.md

on:
  schedule:
    - cron: '0 */2 * * *' # every 2 hours
  workflow_dispatch:

concurrency:
  group: github-stats
  cancel-in-progress: false

jobs:
  update-readme:
    name: Update README.md
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4
        
    - name: Run GitHub Stats Action
      uses: thanhhaudev/github-stats@master
      env:
        BRANCH_NAME: ${{ github.ref_name }}
        WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        COMMIT_MESSAGE: "update metrics"
        WAKATIME_RANGE: "last_7_days"
        WAKATIME_DATA: "EDITORS,LANGUAGES"
        SHOW_METRICS: "CODING_STREAK,LANGUAGE_PER_REPO,LANGUAGES_AND_TOOLS,COMMIT_DAYS_OF_WEEK,COMMIT_TIMES_OF_DAY,WAKATIME_SPENT_TIME,WAKATIME_AI_STATS"
        TIME_ZONE: "Europe/Berlin"
        TIME_LAYOUT: "02.01.2006 15:04:05 UTC"
        SHOW_LAST_UPDATE: "true"
        PROGRESS_BAR_VERSION: "1"
        DEBUG: "true"