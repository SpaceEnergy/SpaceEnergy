name: Update README.md

on:
  schedule:
    - cron: '0 */2 * * *' # every 2 hours
  workflow_dispatch:

concurrency:
  group: github-stats
  cancel-in-progress: false

jobs:
  update-readme:
    name: Update README.md
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4
        
    - name: Run GitHub Stats Action
      uses: thanhhaudev/github-stats@master
      env:
        BRANCH_NAME: ${{ github.ref_name }}
        WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        COMMIT_MESSAGE: "update metrics"
        WAKATIME_RANGE: "all_time"
        WAKATIME_DATA: "EDITORS,LANGUAGES,PROJECTS,OPERATING_SYSTEMS"
        SHOW_METRICS: "COMMIT_TIMES_OF_DAY,COMMIT_DAYS_OF_WEEK,LANGUAGE_PER_REPO,LANGUAGES_AND_TOOLS,WAKATIME_SPENT_TIME,CODING_STREAK,WAKATIME_AI_STATS"
        TIME_ZONE: "Europe/Berlin"
        TIME_LAYOUT: "2006-01-02 15:04:05 MST"
        SHOW_LAST_UPDATE: "true"
        PROGRESS_BAR_VERSION: "1"